databases:
  - name: dotnew_insights_production
    databaseName: dotnew_insights_production
    user: dotnew_insights_production_user
    plan: free

services:
  - type: web
    name: dotnew-insights-engine
    runtime: ruby
    plan: free
    buildCommand: "./bin/render-build.sh"
    startCommand: "bundle exec puma -C config/puma.rb"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dotnew_insights_production
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: true
    healthCheckPath: /up
    autoDeploy: true 